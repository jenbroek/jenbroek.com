<header id="site-header">
	<nav id="site-nav">
		{{ range site.Menus.main }}
		<a href="{{ .URL }}">{{ .Name | safeHTML }}</a>
		{{ end }}
	</nav>

	<div id="site-nav-btns">
		<label aria-label="Show site navigation">
			{{ partialCached `icon` `⇄` `⇄` }}
			<input type="checkbox" id="toggle-site-nav" class="sr-only">
		</label>

		<label aria-label="Invert colors">
			{{ partialCached `icon` `💡` `💡` }}
			<input type="checkbox" id="invert-colors" class="sr-only">
		</label>
	</div>
</header>
